services:
  openclaw:
    build: ./openclaw
    restart: unless-stopped
    env_file: .env
    environment:
      - OPENCLAW_STATE_DIR=/openclaw-state
      - OPENCLAW_CONFIG_PATH=/config/openclaw/openclaw.json
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
    volumes:
      - ./data:/data
      - ./logs:/logs
      - ./skills:/skills
      - ./config:/config
      - openclaw_state:/openclaw-state
    ports:
      - "18789:18789"

volumes:
  openclaw_state:
