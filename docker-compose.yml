services:
  openclaw:
    build: ./openclaw
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/data
      - ./logs:/logs
      - ./skills:/skills
      - ./config:/config
    depends_on:
      - placeholder

  # Placeholder service — remove when real services are added
  # docker compose requires at least one service to validate cleanly
  placeholder:
    image: busybox
    command: ["true"]
